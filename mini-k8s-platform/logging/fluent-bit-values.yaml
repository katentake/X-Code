# fluent-bit-values.yaml

# 1. 确保以 DaemonSet 方式部署在每个 Node
kind: DaemonSet

# 2. 核心配置：定义 input, filter 和 output
config:
  service: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        HTTP_Server   on
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Parsers_File  parsers.conf

  # 收集 /var/log/containers/ 下的所有容器日志
  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  # 过滤并补充 Kubernetes 的 Metadata (Namespace, Pod Name 等)
  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

  # 输出配置：将日志发送给 Loki
  outputs: |
    [OUTPUT]
        Name          loki
        Match         *
        Host          loki.logging.svc.cluster.local
        Port          3100
        Labels        job=fluentbit
        Auto_Kubernetes_Labels On
