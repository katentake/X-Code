apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: default
  labels:
    app: order-service
spec:
  replicas: 2                     # 部署2个副本，用于后续演练跨节点调度与高可用
  selector:
    matchLabels:
      app: order-service          # 必须严格匹配下面 Pod 模板的标签
  template:
    metadata:
      labels:
        app: order-service        # Pod 的标签，Service 会根据这个标签把流量导过来
    spec:
      containers:
      - name: order-container
        image: {{ .Values.order.image }}
        imagePullPolicy: Never    # ⚡️极其重要：告诉 K8s 绝对不要去外网拉，只用本地节点缓存的镜像
        ports:
        - containerPort: 5000
          name: http-port

        # 💡 【核心整合点】所有环境变量统一归纳在一个 env 块下，排好队
        env:
        # ⚡️ 面试必杀：强制 Python 实时刷新 stdout/stderr，拒绝盲盒日志
        - name: PYTHONUNBUFFERED
          value: "1"
        # ⚡️ 注入我们在 Python 代码里写好的环境变量，对齐 Postgres 与 Redis 服务
        - name: DB_HOST
          value: "postgres-service" # 唯一的 DB_HOST
        - name: DB_NAME
          value: "ecommerce"
        - name: DB_USER
          value: "terry"
        - name: DB_PASSWORD
          value: "supersecretpwd"
        - name: REDIS_HOST
          value: "mini-ecommerce-redis-svc"    # 从原本尾部 env 块合并过来的变量
        - name: REDIS_PORT
          value: "6379"
        # 如果你的应用代码只认一个完整的 URL（比如 Python/Go 常用的格式）：
        - name: REDIS_URL
          value: "redis://mini-ecommerce-redis-svc:6379/0"

        # SRE 面试必杀：资源配额与限制 (QoS 级别属于 Burstable)
        resources:
          requests:
            cpu: "100m"           # 相当于 0.1 核，K8s 调度时看哪个 Node 还有这个余量
            memory: "128Mi"
          limits:
            cpu: "500m"           # 允许高负载时飚到 0.5 核
            memory: "256Mi"       # 严格限制，超过会直接触发 OOMKilled

        # SRE 面试必杀：双探针机制（零停机滚动升级的关键，已去除重复定义）
        livenessProbe:            # 进程死锁或假死时，K8s 会自动自动重启该容器
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5  # 容器启动后等 5 秒再开始探测
          periodSeconds: 10       # 每 10 秒探测一次
        readinessProbe:           # 只有探测通过，Service 才会把 Pod IP 加进后端端点，防止 502
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
