apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-ssd-pod
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: main
        image: nginx:alpine
      # ─── 节点选择器配置 ───
      nodeSelector:
        disk: ssd
